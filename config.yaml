# =============================================================================
# H3 Multi-Datensatz Converter -- Konfiguration
# =============================================================================
# Verwendet von: scripts/convert_and_import.py
# Das Skript liest diese Datei beim Start und fragt, ob die Defaults
# verwendet werden sollen. Bei "n" werden alle Werte interaktiv eingegeben.
# =============================================================================

# -----------------------------------------------------------------------------
# Datasets
# -----------------------------------------------------------------------------
# Jedes Dataset hat eine Rolle:
#   target:          Kern-Datensatz, wird beschrieben. OBJEKTART in Assoziationsmatrix.
#   static_context:  Statischer Kontext pro Feature (z.B. Gemeinde, Kanton).
#                    Immer im Satz, fuellt keine Assoziations-Slots.
#   dynamic_context: (Zukunft) Dynamischer Kontext via Assoziationsmatrix.
#
# name_field: Spalte die den Anzeigenamen enthaelt (wird zu NAME gemappt)
# label:      Anzeige-Label im Satz (nur static_context/dynamic_context)
# slots:      Max. Anzahl Features im Satz (nur static_context/dynamic_context)
# -----------------------------------------------------------------------------
datasets:
  - name: swissnames3d
    role: target
    files:
      - data/swissNAMES3D_PLY.shp
      - data/swissNAMES3D_LIN.shp
      - data/swissNAMES3D_PKT.shp
    name_field: NAME

  - name: gemeinden
    role: static_context
    slots: 2
    label: Gemeinde
    files:
      - data/swissboundaries3d_2026-01_2056_5728.shp/swissBOUNDARIES3D_1_5_TLM_HOHEITSGEBIET.shp
    name_field: NAME

  - name: kantone
    role: static_context
    slots: 1
    label: Kanton
    files:
      - data/swissboundaries3d_2026-01_2056_5728.shp/swissBOUNDARIES3D_1_5_TLM_KANTONSGEBIET.shp
    name_field: NAME

  - name: bezirke
    role: static_context
    slots: 1
    label: Bezirk
    files:
      - data/swissboundaries3d_2026-01_2056_5728.shp/swissBOUNDARIES3D_1_5_TLM_BEZIRKSGEBIET.shp
    name_field: NAME

# -----------------------------------------------------------------------------
# Output
# -----------------------------------------------------------------------------
output_file: data/swissNAMES3D_combined_h3.duckdb

# -----------------------------------------------------------------------------
# H3 Konvertierungsparameter
# -----------------------------------------------------------------------------

# Ziel-Anzahl H3-Cells pro Geometrie.
# Nur relevant fuer Polygone / MultiPolygone (adaptive Resolution).
# Punkte und Linien verwenden immer max_resolution.
target_cells: 100

# Minimale H3-Resolution fuer die adaptive Aufloesung (Polygone).
min_resolution: 5

# Maximale H3-Resolution.
#   - Polygone/MultiPolygone: obere Grenze der adaptiven Aufloesung.
#   - Punkte / Linien / MultiPoints / MultiLines: wird direkt verwendet.
max_resolution: 13

# Containment-Modus fuer die Polygon-zu-H3 Konvertierung.
#   center:       Nur Zellen, deren Mittelpunkt im Polygon liegt
#   full:         Nur Zellen, die vollstaendig im Polygon liegen
#   overlap:      Jede Ueberschneidung zaehlt (empfohlen)
#   overlap_bbox: Bounding-Box Ueberschneidung (schneller, aber groeber)
containment_mode: overlap
